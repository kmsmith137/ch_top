# Each repo is cloned into top/<name> and worktree-added into each worktree.
# ch_top assumes your conda toolchain env is already active (see README.md).
#
# REMINDER: init-toplevel / init-worktree / delete-worktree are
# manifest-driven -- they pick up new repos listed here automatically.
# The venv build (build_venv in ch_top_helpers.py) is NOT: it hardcodes the
# per-repo build + editable-install recipe (make order, --no-build-isolation,
# smoke tests). When you add a repo below, you MUST also add it to the BUILD list
# in ch_top_helpers.py, or it will be silently missing from every venv.
# (build_venv prints a warning for any manifest repo it does not build.)
#
# Order matters: list dependencies before dependents. pipmake -- the build
# backend for ksgpu/pirate -- comes first, then ksgpu, then pirate.

[pipmake]
url    = "github:kmsmith137/pipmake"  # build backend for ksgpu/pirate (pure Python)
branch = "main"

[ksgpu]
url    = "github:kmsmith137/ksgpu"    # uses your ~/.ssh/config 'github' alias
branch = "kms"

[pirate]
url    = "github:kmsmith137/pirate"   # has submodule asdf-cxx (auto-handled)
branch = "kms"
